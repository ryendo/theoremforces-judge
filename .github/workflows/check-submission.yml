name: Check Lean submission

# Runs on every push to a `submission/*` branch and on PRs that touch a
# Submission_*.lean file. main is protected — only the ProofGarden web app
# is allowed to push to submission branches (use a fine-grained PAT or
# GitHub App with `contents:write` scoped to this repo only).

on:
  push:
    branches:
      - "submission/**"
    paths:
      - "ProofGarden/Challenges/**/Submissions/Submission_*.lean"
  pull_request:
    paths:
      - "ProofGarden/Challenges/**/Submissions/Submission_*.lean"

permissions:
  contents: read

concurrency:
  # Don't pile up runs for the same branch — supersede in-flight ones.
  group: lean-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # GitHub-hosted runner only. Do NOT switch this to a self-hosted runner.
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan + Lean toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show toolchain
        run: |
          cat lean-toolchain
          lean --version
          lake --version

      - name: Restore Lake cache
        uses: actions/cache@v4
        with:
          path: |
            .lake
            ~/.elan
          key: lean-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: |
            lean-${{ runner.os }}-

      - name: Build
        run: lake build
