name: Check Lean submission

# Runs on every push to a `submission/*` or `challenge-validation/*`
# branch that touches either a Submission_*.lean (user proof attempt)
# or a Validation_*.lean (auto-check of a new user challenge).
# main is protected — only the LeanForces web app is allowed to push
# to these branches.

on:
  push:
    branches:
      - "submission/**"
      - "challenge-validation/**"
    paths:
      - "Leanforces/Challenges/**/Submissions/Submission_*.lean"
      - "Leanforces/Challenges/**/Validations/Validation_*.lean"
  pull_request:
    paths:
      - "Leanforces/Challenges/**/Submissions/Submission_*.lean"
      - "Leanforces/Challenges/**/Validations/Validation_*.lean"

permissions:
  contents: read

concurrency:
  group: lean-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # GitHub-hosted runner only. Never switch to a self-hosted runner.
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout (with last 2 commits so we can diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install elan + Lean toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show toolchain
        run: |
          cat lean-toolchain
          lean --version
          lake --version

      # ── Cache the entire .lake/ tree (Mathlib oleans, build artefacts for
      #    previously-built submissions, manifests, etc.) keyed on toolchain
      #    + manifest. This is what makes incremental runs fast: only the
      #    NEW submission_*.lean compiles.
      - name: Restore Lake cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            .lake
            ~/.elan
            ~/.cache/mathlib
          key: lean-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}-v3
          restore-keys: |
            lean-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}-
            lean-${{ runner.os }}-

      - name: Lake update (no-op when manifest matches)
        run: lake update --no-build || true

      # Mathlib's pre-built oleans CDN. Drops the Mathlib compile from
      # ~30 min to ~30 s for a known toolchain combo.
      - name: Download Mathlib cache (when Mathlib is a dependency)
        run: |
          if grep -q "leanprover-community/mathlib" lake-manifest.json; then
            lake exe cache get || echo "cache get failed; will compile what's needed"
          else
            echo "No Mathlib dependency — skipping cache fetch."
          fi
        continue-on-error: true

      # The web app writes `module=<dotted.path>` into the commit message so
      # we can do `lake build <module>` and skip every other submission file.
      # Falls back to a git-diff-based detection, then to a full build.
      - name: Find submission module
        id: find
        run: |
          MODULE_FROM_MSG=$(git log -1 --pretty=%B | grep -oE 'module=[A-Za-z0-9_.]+' | head -1 | cut -d= -f2 || true)
          if [ -n "$MODULE_FROM_MSG" ]; then
            echo "module=$MODULE_FROM_MSG" >> "$GITHUB_OUTPUT"
            echo "Detected module from commit message: $MODULE_FROM_MSG"
            exit 0
          fi
          FILES=$(git diff-tree --no-commit-id --name-only -r HEAD | grep -E '^Leanforces/Challenges/.+/(Submissions/Submission_|Validations/Validation_)[A-Za-z0-9_-]+\.lean$' || true)
          if [ -z "$FILES" ]; then
            echo "No submission file found — falling back to full build."
            echo "module=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FILE=$(echo "$FILES" | head -1)
          MODULE=$(echo "$FILE" | sed 's|\.lean$||' | tr '/' '.')
          echo "module=$MODULE" >> "$GITHUB_OUTPUT"
          echo "Detected module from diff: $MODULE"

      - name: Build (targeted)
        run: |
          set -e
          if [ -n "${{ steps.find.outputs.module }}" ]; then
            echo "lake build ${{ steps.find.outputs.module }}"
            lake build "${{ steps.find.outputs.module }}"
          else
            echo "lake build (full)"
            lake build
          fi
